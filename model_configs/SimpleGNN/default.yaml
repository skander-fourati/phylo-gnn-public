 # Graph construction
  k: 10            # nearest phylogenetic neighbours

  # Model
  input_dim: 4
  hidden_dim: 64
  output_dim: 4
  p_dropout: 0.5
  num_layers: 3

  # Training
  lr: 0.001
  epochs: 300

  dropout: 0.5

  # Flags
  grid_search: True # DISABLES ALL OTHER HYPER PARAMS IN THIS FILE
  edge_weight: True
  pos_weight: True


